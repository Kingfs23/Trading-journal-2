<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KingFX History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">K</div>
      <div>
        <div class="title">History & Performance</div>
        <div class="subtitle">Win rate, net profit, and trade screenshots</div>
      </div>
    </div>

    <nav class="nav">
      <a class="navlink" href="index.html">Journal</a>
      <a class="navlink active" href="history.html">History</a>
      <button id="refreshBtn" class="btn btn-ghost">Refresh</button>
    </nav>
  </header>

  <main class="container historyPage">
    <section class="statsGrid">
      <article class="statCard">
        <span>Total Trades</span>
        <strong id="kpiTrades">0</strong>
      </article>
      <article class="statCard">
        <span>Win Rate</span>
        <strong id="kpiWinRate">0%</strong>
        <small><b id="kpiWins">0</b> wins / <b id="kpiLosses">0</b> losses / <b id="kpiBE">0</b> BE</small>
      </article>
      <article class="statCard">
        <span>Net Profit</span>
        <strong id="kpiProfit">$0.00</strong>
      </article>
      <article class="statCard">
        <span>Average R</span>
        <strong id="kpiAvgR">0.00R</strong>
      </article>
    </section>

    <section class="historyTools">
      <label class="field">
        <span>Search</span>
        <input id="searchInput" placeholder="Pair, notes, POI..." />
      </label>
      <label class="field">
        <span>Result</span>
        <select id="resultFilter">
          <option value="">All results</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
          <option value="be">Break Even</option>
        </select>
      </label>
      <label class="field">
        <span>Pair</span>
        <select id="pairFilter">
          <option value="">All pairs</option>
        </select>
      </label>
      <button id="exportBtn" class="btn btn-primary">Export CSV</button>
    </section>

    <section class="historyLayout">
      <div>
        <div class="sectionLine">
          <h1>Trade History</h1>
          <span id="tradeCountLabel">0 trades</span>
        </div>
        <div id="historyContainer" class="tradeList">
          <div class="emptyState">Loading trades...</div>
        </div>
      </div>

      <aside class="monthlyPanel">
        <div class="sectionLine">
          <h2>Monthly Breakdown</h2>
          <span id="lastUpdated"></span>
        </div>
        <div id="monthlyTable" class="monthList"></div>

        <div class="sectionLine pairStatsTitle">
          <h2>Pair Performance</h2>
          <span>Wins / Losses</span>
        </div>
        <div id="pairStatsTable" class="pairStatsList"></div>
      </aside>
    </section>
  </main>

  <div id="imgModal" class="modal" aria-hidden="true">
    <div class="modalPanel">
      <div class="modalTop">
        <div id="modalTitle" class="modalTitle">Preview</div>
        <button id="closeModalBtn" class="btn btn-ghost">Close</button>
      </div>
      <img id="modalImg" alt="Trade preview" />
    </div>
  </div>

  <script id="supabaseLibrary" async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="document-trades.js"></script>
  <script src="history.js"></script>
</body>
</html>
